<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conference Schedule | Charting Cosmic Dawn 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header class="sticky-header">
            <div class="header-content">
                <a href="https://indico.nbi.ku.dk/event/2223/overview" target="_blank">
                    <h1>Charting Cosmic Dawn</h1>
                </a>
                <a href="https://docs.google.com/spreadsheets/d/1rq8gXhR3yOG_mf9uAKB4rX-Ioh9jobWqa7MPcN32ra4/edit?gid=1570382421"
                    target="_blank">
                    <p class="subtitle">Copenhagen April 13-17, 2026 • Conference Schedule</p>
                </a>
                <div class="actions-toolbar">
                    <button id="undo-btn" title="Undo (Cmd+Z)" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                            <path d="M3 3v5h5" />
                        </svg>
                        Undo
                    </button>
                    <button id="redo-btn" title="Redo (Cmd+Shift+Z)" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
                            <path d="M21 3v5h-5" />
                        </svg>
                        Redo
                    </button>
                    <div class="divider"></div>
                    <button id="now-btn" title="Jump to Current Time (T)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10" />
                            <polyline points="12 6 12 12 16 14" />
                        </svg>
                        Now
                    </button>
                    <div class="divider"></div>
                    <button id="load-btn" title="Load JSON file (Cmd+O)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="17 8 12 3 7 8" />
                            <line x1="12" y1="3" x2="12" y2="15" />
                        </svg>
                        Load
                    </button>
                    <button id="save-btn" title="Save JSON file (Cmd+S)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="7 10 12 15 17 10" />
                            <line x1="12" y1="15" x2="12" y2="3" />
                        </svg>
                        Save
                    </button>
                    <div class="divider"></div>
                    <div class="zoom-controls">
                        <svg style="opacity: 0.5" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/>
                        </svg>
                        <input type="range" id="zoom-slider" min="80" max="1500" value="500">
                        <svg style="opacity: 0.5" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
                        </svg>
                    </div>
                    <input type="file" id="file-input" style="display: none;" accept=".json">
                </div>
                <div id="day-nav-container"></div>
            </div>
        </header>

        <div class="timeline-container" id="timeline-container">
            <!-- For Calendar View -->
            <div id="calendar-view">
                <div class="calendar-grid" id="calendar-grid">
                    <!-- Hour lines and events will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
